<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система судейства</title>
    
    <!-- ФАЙЛ СТИЛЕЙ -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Встроенные стили -->
    <style>
    .status.info {
        background: #4CAF50 !important;
        color: white !important;
        font-weight: bold;
        padding: 15px;
        border-radius: 8px;
        animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
        100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
    }
    
    .local-badge {
        background: #ff9800;
        color: white;
        font-size: 11px;
        padding: 1px 6px;
        border-radius: 3px;
        margin-left: 8px;
    }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="Логотип" class="header-logo">
            <h1>🏆 СИСТЕМА СУДЕЙСТВА</h1>
            <p class="subtitle">Оценка участников соревнований</p>
        </header>

        <main>
            <div class="card">
                <!-- Выбор судьи -->
                <div class="form-group">
                    <label>ВЫБЕРИТЕ СУДЬЮ</label>
                    <select id="judgeSelect">
                        <option value="">-- Выберите судью --</option>
                        <!-- Заполнится автоматически из Google Sheets -->
                    </select>
                </div>
                
                <!-- Выбор категории -->
                <div class="form-group">
                    <label>ВЫБЕРИТЕ КАТЕГОРИЮ</label>
                    <select id="categorySelect">
                        <option value="">-- Выберите категорию --</option>
                        <!-- Заполнится автоматически из Google Sheets -->
                    </select>
                </div>
                
                <!-- Выбор фигуры (скрыт по умолчанию) -->
                <div class="form-group" id="figureGroup" style="display: none;">
                    <label>ВЫБЕРИТЕ ФИГУРУ</label>
                    <select id="figureSelect">
                        <option value="">-- Выберите фигуру --</option>
                        <!-- Заполнится из app.js -->
                    </select>
                </div>

                <!-- Выбор бригады (скрыт по умолчанию) -->
                <div class="form-group" id="brigadeGroup" style="display: none;">
                    <label>ВЫБЕРИТЕ БРИГАДУ</label>
                    <select id="brigadeSelect">
                        <option value="">-- Выберите бригаду --</option>
                        <option value="Исполнение">Исполнение</option>
                        <option value="Художественное впечатление">Художественное впечатление</option>
                        <option value="Сложность">Сложность</option>
                    </select>
                </div>

                <!-- Стартовый номер и ФИО -->
                <div class="info-row">
                    <div class="info-item">
                        <div class="info-label">СТАРТОВЫЙ НОМЕР</div>
                        <div class="info-value" id="startNumber">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">ФИО УЧАСТНИКА</div>
                        <div class="info-value" id="fullName">-</div>
                    </div>
                </div>
                
                <!-- Балл -->
                <div class="form-group">
                    <label>БАЛЛ (0-10)</label>
                    <div class="score-input-group">
                        <input type="text" id="scoreInput" placeholder="Введите балл от 0 до 10" autofocus>
                    </div>
                </div>
                
                <!-- Прогресс -->
                <div class="progress">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">Участник 0 из 0</div>
                
                <!-- Кнопка показа/скрытия клавиатуры -->
                <button id="toggleKeyboardBtn" style="margin-top: 10px; padding: 10px; background: #6c757d; color: white; border: none; border-radius: 5px; width: 100%; cursor: pointer;">
                    <i class="fas fa-keyboard"></i> Показать клавиатуру
                </button>
                
                <!-- Кастомная клавиатура -->
                <div class="custom-keyboard" id="customKeyboard" style="display: none;">
                    <div class="keyboard-row">
                        <button class="keyboard-btn" data-value="7">7</button>
                        <button class="keyboard-btn" data-value="8">8</button>
                        <button class="keyboard-btn" data-value="9">9</button>
                    </div>
                    <div class="keyboard-row">
                        <button class="keyboard-btn" data-value="4">4</button>
                        <button class="keyboard-btn" data-value="5">5</button>
                        <button class="keyboard-btn" data-value="6">6</button>
                    </div>
                    <div class="keyboard-row">
                        <button class="keyboard-btn" data-value="1">1</button>
                        <button class="keyboard-btn" data-value="2">2</button>
                        <button class="keyboard-btn" data-value="3">3</button>
                    </div>
                    <div class="keyboard-row">
                        <button class="keyboard-btn" data-value="0">0</button>
                        <button class="keyboard-btn" data-value=",">,</button>
                        <button class="keyboard-btn" id="keyboardBackspace">
                            <i class="fas fa-backspace"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Кнопки -->
                <div class="button-group">
                    <button class="submit-btn" id="submitBtn">✅ ОЦЕНИТЬ</button>               
                    <button class="skip-btn" id="skipBtn">⏭️ ПРОПУСТИТЬ</button>
                    <button class="back-btn" id="backBtn">⬅️ НАЗАД</button>
                    <button class="send-btn" id="sendScoresBtn" style="display: none;">📤 ОТПРАВИТЬ ОЦЕНКИ</button>
                    <button id="resetSessionBtn" type="button" class="btn btn-danger">🔄 Сбросить сессию</button>
                </div>
                
                <!-- Статус -->
                <div class="status" id="statusMessage" style="display: none;"></div>
                
                <!-- Кнопка раскрытия списка участников -->
                <div class="toggle-participants">
                    <button id="toggleParticipantsBtn" class="toggle-btn">
                        <i class="fas fa-chevron-down"></i> Показать список участников
                    </button>
                </div>
                
                <!-- Список участников (скрыт по умолчанию) -->
                <div class="participants-list" id="participantsListContainer" style="display: none;">
                    <h3>📋 СПИСОК УЧАСТНИКОВ</h3>
                    <div id="participantsList"></div>
                </div>
                
            </div>
        </main>

        <footer>
            <p>Осталось участников: <span id="remainingCount">0</span> | Оценено: <span id="evaluatedCount">0</span></p>
        </footer>
    </div>
    
    <!-- ПОДКЛЮЧЕНИЕ JS ФАЙЛОВ -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
